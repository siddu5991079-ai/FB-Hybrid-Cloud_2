name: File.io Video Factory

on:
  workflow_dispatch:
    inputs:
      titles_list:
        description: 'Titles Array (Separate with ,,)'
        required: true
        default: 'Live Match Today,,Watch Full Match DC vs GT'
      descs_list:
        description: 'Descriptions Array (Separate with ,,)'
        required: true
        default: 'Watch the live action here without buffer,,Click the link to watch!'
      hashtags:
        description: 'Hashtags (Space separated)'
        required: true
        default: '#CricketLive #MatchToday #IPL2026'
      target_url:
        description: 'Target Website URL'
        required: true
        default: 'https://dadocric.st/player.php?id=willow'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Hours Limit

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install System Tools (FFmpeg & Chrome)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg google-chrome-stable xvfb

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Node Libraries
      # Node.js ke liye zaroori libraries
      run: npm install puppeteer axios form-data

    - name: Start The Factory
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        TITLES_LIST: ${{ inputs.titles_list }}
        DESCS_LIST: ${{ inputs.descs_list }}
        HASHTAGS: ${{ inputs.hashtags }}
        TARGET_URL: ${{ inputs.target_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node ghost_bot.js







